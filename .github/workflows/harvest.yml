name: Harvest Qullamaggie Streams

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: "YouTube channel videos URL"
        required: true
        default: "https://www.youtube.com/@qullamaggie/videos"
      mode:
        description: "Collection mode: ytdlp or api"
        required: true
        default: "ytdlp"
      channel_id:
        description: "Optional YouTube channel ID for API mode"
        required: false
        default: ""
      live_only:
        description: "Only likely livestreams"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "false"
      limit:
        description: "Max videos to process, blank = all"
        required: false
        default: "100"
      langs:
        description: "Transcript languages"
        required: true
        default: "en,en-US"
      save_all_transcripts:
        description: "Store raw transcripts"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      validate_tickers:
        description: "Validate tickers against SEC list"
        required: true
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run harvester
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          LIVE_FLAG=""
          SAVE_FLAG=""
          VALIDATE_FLAG=""

          if [ "${{ github.event.inputs.live_only || 'false' }}" = "true" ]; then LIVE_FLAG="--live-only"; fi
          if [ "${{ github.event.inputs.save_all_transcripts || 'true' }}" = "true" ]; then SAVE_FLAG="--save-all-transcripts"; fi
          if [ "${{ github.event.inputs.validate_tickers || 'true' }}" = "true" ]; then VALIDATE_FLAG="--validate-tickers"; fi

          LIMIT_INPUT="${{ github.event.inputs.limit || '100' }}"
          LIMIT_ARG=""
          if [ -n "$LIMIT_INPUT" ]; then LIMIT_ARG="--limit $LIMIT_INPUT"; fi

          MODE_INPUT="${{ github.event.inputs.mode || 'ytdlp' }}"
          CHANNEL_URL_INPUT="${{ github.event.inputs.channel_url || 'https://www.youtube.com/@qullamaggie/videos' }}"
          CHANNEL_ID_INPUT="${{ github.event.inputs.channel_id || '' }}"
          LANGS_INPUT="${{ github.event.inputs.langs || 'en,en-US' }}"

          python scripts/qullamaggie_stream_harvester_v2.py \
            --channel-url "$CHANNEL_URL_INPUT" \
            --mode "$MODE_INPUT" \
            --channel-id "$CHANNEL_ID_INPUT" \
            --langs "$LANGS_INPUT" \
            $LIVE_FLAG \
            $SAVE_FLAG \
            $VALIDATE_FLAG \
            $LIMIT_ARG \
            --outdir out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qullamaggie-harvest-output
          path: out
          if-no-files-found: error
